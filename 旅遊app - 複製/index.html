// Compute which trip day corresponds to today's date
function computeTodayIndex() {
  const tripDates = ['2026/12/29', '2026/12/30', '2026/12/31', '2027/01/01', '2027/01/02'];
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const dd   = String(now.getDate()).padStart(2, '0');
  const today = `${yyyy}/${mm}/${dd}`;
  const idx = tripDates.indexOf(today);
  if (idx >= 0) return idx;
  // Before trip → Day 1; after trip → Day 5
  return now < new Date('2026-12-29') ? 0 : 4;
}

function AvatarStack({ ids, size = 24, max = 5 }) {

// ─────────────────────────────────────────────────────────────
// Money — large number with currency
// ─────────────────────────────────────────────────────────────
function Money({ krw, twd, currency = 'TWD', size = 'm', muted = false }) {
  const sz = { s: 14, m: 18, l: 24, xl: 32 }[size];
  const value = currency === 'TWD'
    ? (twd != null ? twd : krwToTwd(krw))
    : (krw != null ? krw : twd * TRIP.rate.TWD_KRW);
  const text = currency === 'TWD' ? fmtTWD(value) : fmtKRW(value);
  return (
    <span style={{
      fontSize: sz, fontWeight: 700, color: muted ? T.ink2 : T.ink,
      letterSpacing: -0.5, fontVariantNumeric: 'tabular-nums',
    }}>
      {text}
    </span>
  );
}

// ─────────────────────────────────────────────────────────────
// Button
// ─────────────────────────────────────────────────────────────
function Btn({ children, onClick, variant = 'primary', icon, size = 'm', style = {}, full }) {
  const variants = {
    primary:  { bg: T.primary, color: '#fff', border: 'none' },
    soft:     { bg: T.primarySoft, color: T.primary, border: 'none' },
    ghost:    { bg: 'transparent', color: T.primary, border: '1.5px solid ' + T.primary },
    neutral:  { bg: '#F5F0E4', color: T.ink, border: 'none' },
    warm:     { bg: T.orange, color: '#fff', border: 'none' },
  };
  const v = variants[variant];
  const sizes = { s:{h:32,fz:13,px:14}, m:{h:40,fz:14,px:18}, l:{h:50,fz:16,px:22} }[size];
  return (
    <button onClick={onClick} style={{
      height: sizes.h, padding: `0 ${sizes.px}px`,
      borderRadius: sizes.h / 2, border: v.border, background: v.bg, color: v.color,
      fontFamily: T.font, fontSize: sizes.fz, fontWeight: 600, letterSpacing: 0.2,
      cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 6,
      width: full ? '100%' : undefined, justifyContent: 'center',
      whiteSpace: 'nowrap', flexShrink: 0,
      ...style,
    }}>
      {icon && <Icon name={icon} size={sizes.fz + 4} color={v.color} strokeWidth={2}/>}
      {children}
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// Duration helpers
// ─────────────────────────────────────────────────────────────
function parseDurMinutes(dur) {
  if (!dur) return 60;
  const n = parseInt(dur, 10);
  return isNaN(n) ? 60 : Math.max(0, n);
}
function formatDurLabel(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return m + ' min';
  if (m === 0) return h + ' h';
  return h + ' h ' + m + ' min';
}

function ItineraryForm({ item, dayIdx, onSave, onDelete, onClose }) {
  const [selectedDay,   setSelectedDay]   = useState(item?.dayIdx ?? dayIdx);
  const [showDayPicker, setShowDayPicker] = useState(false);
  const [time,          setTime]          = useState(item?.time  || '09:00');
  const [durH,          setDurH]          = useState(() => Math.floor(parseDurMinutes(item?.dur) / 60));
  const [durM,          setDurM]          = useState(() => parseDurMinutes(item?.dur) % 60);
  const [type,          setType]          = useState(item?.type  || 'food');
  const [title,         setTitle]         = useState(item?.title || '');
  const [addr,          setAddr]          = useState(item?.addr   || '');
  const [mapUrl,        setMapUrl]        = useState(item?.mapUrl || '');
  const [note,          setNote]          = useState(item?.note   || '');
  const [participants,  setParticipants]  = useState(
    item?.participants || MEMBERS.map(m => m.id)
  );

  const toggleP = (id) =>
    setParticipants(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const canSave = title.trim().length > 0;

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  const handleSave = () => {
    if (!canSave) return;
    onSave({
      id:    item?.id || ('i' + Date.now()),
      dayIdx: selectedDay,
      time, dur: String(durH * 60 + durM) + ' min', type,
      title:  title.trim(),
      addr:   addr.trim(),
      mapUrl: mapUrl.trim(),
      note:   note.trim(),
      participants,
    });
  };

    <div style={{
      position: 'fixed', inset: 0,
      width: '100%', height: '100dvh',

// ─────────────────────────────────────────────────────────────
function ScreenItinerary({ initialDay = TRIP.todayIndex, allItemsExt, onSaveItemExt, onDeleteItemExt, onOpenEditForm }) {
  const [active,       setActive]       = useState(initialDay);
  const [memberFilter, setMemberFilter] = useState('all');

  const [allItemsLocal, setAllItemsLocal] = useState(() => {
    const m = {};
    DAYS.forEach(d => { m[d.idx] = d.items.map(it => ({ ...it })); });
    return m;
  });

  const allItems = allItemsExt || allItemsLocal;
  const day   = DAYS[active];
  const items = allItems[active] || [];
  const isToday = active === TRIP.todayIndex;

  const filteredItems = memberFilter === 'all'
    ? items
    : items.filter(it => (it.participants || []).includes(memberFilter));

  const handleDelete = (itemId) => {
    if (onDeleteItemExt) {
      onDeleteItemExt(itemId, active);
    } else {
      setAllItemsLocal(prev => ({ ...prev, [active]: prev[active].filter(x => x.id !== itemId) }));
    }
  };

  const openAdd  = () => { if (onOpenEditForm) onOpenEditForm(null, active); };
  const openEdit = (it) => { if (onOpenEditForm) onOpenEditForm(it, active); };

  return (
    <>
      {/* day tabs */}
      <div style={{ paddingTop: 4 }}>
        <DayTabs active={active} onChange={i => { setActive(i); setMemberFilter('all'); }}/>
      </div>

      {/* day header */}
      <div style={{ padding: '0 20px 10px' }}>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap: 8 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
              <div style={{ fontSize: 22, fontWeight: 700, color: T.ink, letterSpacing: -0.3 }}>
                {day.title}
              </div>
              {isToday && <Pill bg={T.orange} color="#fff" size="s">今天</Pill>}
            </div>
            <div style={{ fontSize: 13, color: T.ink3, marginTop: 4 }}>
              {day.date} {day.dow} · {filteredItems.length} 個行程
            </div>
          </div>
          <div style={{ flexShrink: 0 }}><WeatherChip {...day.weather}/></div>
        </div>
      </div>

      {/* 成員篩選 chips */}
      <div style={{
        padding: '0 0 12px 16px', display: 'flex', gap: 6,
        overflowX: 'auto', scrollbarWidth: 'none', WebkitOverflowScrolling: 'touch',
      }}>
        {[{ id: 'all', name: '全部' }, ...MEMBERS].map(m => {
          const on = memberFilter === m.id;
          return (
            <button key={m.id} onClick={() => setMemberFilter(m.id)} style={{
              flexShrink: 0, padding: '5px 12px', borderRadius: 999,
              border: on ? 'none' : '1px solid ' + T.divider,
              background: on ? T.primary : '#fff',
              color: on ? '#fff' : T.ink2,
              fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: T.font,
            }}>{m.name}</button>
          );
        })}
        <div style={{ width: 20, flexShrink: 0 }}/>
      </div>

      {/* 行程卡片 */}
      <div style={{ padding: '0 20px', display:'flex', flexDirection:'column', gap: 10 }}>
        {filteredItems.map((it, i) => {
          const cat = findCat(it.type);
          return (
            <div key={it.id} style={{ display:'flex', gap: 10, position:'relative' }}>
              {/* time gutter */}
              <div style={{ width: 52, flexShrink: 0, paddingTop: 18, position:'relative' }}>
                <div style={{
                  fontSize: 13, fontWeight: 700, color: T.ink, textAlign:'right',
                  fontVariantNumeric:'tabular-nums', letterSpacing:-0.3,
                }}>{it.time}</div>
                <div style={{ fontSize: 10, color: T.ink3, textAlign:'right', marginTop: 2 }}>{formatDurLabel(parseDurMinutes(it.dur))}</div>
                {i < filteredItems.length - 1 && (
                  <div style={{
                    position:'absolute', top: 60, bottom: -10, right: -6,
                    width: 2, background: T.divider,
                  }}/>
                )}
                <div style={{
                  position:'absolute', top: 24, right: -10,
                  width: 10, height: 10, borderRadius:'50%',
                  background: '#fff', border: '2px solid ' + cat.color,
                }}/>
              </div>

              {/* card */}
              <Card pad={0} style={{ flex: 1, overflow:'hidden' }}>
                <div style={{ padding: '14px 14px 10px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 6 }}>
                    <CatTile catId={it.type} size={26} radius={8}/>
                    <span style={{ fontSize: 10, color: cat.color, fontWeight: 700, letterSpacing: 0.6, textTransform:'uppercase' }}>
                      {cat.label}
                    </span>
                  </div>
                  <div style={{ fontSize: 15.5, fontWeight: 700, color: T.ink, letterSpacing:-0.2, lineHeight: 1.3 }}>
                    {it.title}
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap: 6, marginTop: 8, fontSize: 12.5, color: T.ink2 }}>
                    <Icon name="pin" size={13} color={T.ink3}/>
                    <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{it.addr}</span>
                  </div>

                  {it.participants && it.participants.length > 0 && (
                    <div style={{ display:'flex', alignItems:'center', gap: 7, marginTop: 10 }}>
                      <AvatarStack ids={it.participants} size={22} max={7}/>
                      <span style={{ fontSize: 11, color: T.ink3, fontWeight: 500 }}>
                        {it.participants.length === MEMBERS.length
                          ? '全員參與'
                          : it.participants.length + ' 人'}
                      </span>
                    </div>
                  )}

                  {it.note && (
                    <div style={{
                      fontSize: 12, color: T.ink2, marginTop: 8,
                      padding: '8px 12px', background: T.bgSoft, borderRadius: 12,
                      borderLeft: '3px solid ' + cat.color,
                    }}>{it.note}</div>
                  )}
                </div>

                {/* footer */}
                <div style={{ display:'flex', borderTop: '1px solid ' + T.divider }}>
                  <button onClick={() => {
                    const url = it.mapUrl
                      ? it.mapUrl
                      : it.addr
                        ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(it.addr)
                        : null;
                    if (url) window.open(url, '_blank');
                  }} style={{
                    flex: 1, padding: '11px 12px', border:'none', background:'transparent',
                    cursor: (it.mapUrl || it.addr) ? 'pointer' : 'default',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    gap: 6, fontSize: 13, fontWeight: 600,
                    color: (it.mapUrl || it.addr) ? T.primary : T.ink4, fontFamily: T.font,
                  }}>
                    <Icon name="map" size={16} color={(it.mapUrl || it.addr) ? T.primary : T.ink4} strokeWidth={2}/>
                    地圖導航
                  </button>
                  <div style={{ width: 1, background: T.divider }}/>
                  <button onClick={() => openEdit(it)} style={{
                    width: 52, border:'none', background:'transparent',
                    cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
                  }}>
                    <Icon name="edit" size={17} color={T.ink3} strokeWidth={1.8}/>
                  </button>
                  <div style={{ width: 1, background: T.divider }}/>
                  <button onClick={() => handleDelete(it.id)} style={{
                    width: 52, border:'none', background:'transparent',
                    cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
                  }}>
                    <Icon name="trash" size={17} color={T.rose} strokeWidth={1.8}/>
                  </button>
                </div>
              </Card>
            </div>
          );
        })}

        {filteredItems.length === 0 && (
          <Card pad={28} style={{ textAlign:'center' }}>
            <div style={{ fontSize: 13, color: T.ink3 }}>
              {memberFilter === 'all'
                ? '此天尚無行程'
                : (MEMBERS.find(m => m.id === memberFilter)?.name ?? '') + ' 當天沒有行程'}
            </div>
          </Card>
        )}

        <button onClick={openAdd} style={{
          width: '100%', padding: '13px 16px', borderRadius: 20,
          border: '2px dashed ' + T.divider, background: 'transparent',
          cursor: 'pointer', fontSize: 14, fontWeight: 600, color: T.ink3,
          fontFamily: T.font, display:'flex', alignItems:'center', justifyContent:'center', gap: 8,
        }}>
          <Icon name="plus" size={18} color={T.ink3}/>
          新增行程
        </button>
      </div>

      <div style={{ height: 24 }}/>
    </>
  );
}

  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: 'rgba(0,0,0,0.35)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }} onClick={onClose}>
      <div style={{
        width: '100%', background: '#fff',
        borderRadius: '24px 24px 0 0',
        padding: '20px 16px 52px', boxSizing: 'border-box',
      }} onClick={e => e.stopPropagation()}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: T.divider, margin: '0 auto 16px' }}/>
        <div style={{ fontSize: 15, fontWeight: 700, color: T.ink, marginBottom: 14, textAlign: 'center' }}>
          選擇日期
        </div>
        {DAYS.map(d => (
          <button key={d.idx} onClick={() => { onSelect(d.idx); onClose(); }} style={{
            width: '100%', padding: '14px 20px', border: 'none',

            cursor: 'pointer', borderRadius: 14, marginBottom: 4,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',

              {d.label}
            </span>
            <span style={{ fontSize: 14, color: T.ink3 }}>{d.dow}　{d.date}</span>

    </div>

}

// ─────────────────────────────────────────────────────────────
// StayForm — 新增 / 編輯住宿 overlay
// ─────────────────────────────────────────────────────────────
function StayForm({ stay, onClose, onSave, onDelete }) {
  // 解析舊格式資料（backward compat）
  const parseDay = (str) => {
    if (str == null) return TRIP.todayIndex;
    if (typeof str === 'number') return Math.max(0, Math.min(DAYS.length - 1, str));
    for (let i = 0; i < DAYS.length; i++) {
      if (String(str).includes(DAYS[i].date)) return i;
    }
    return TRIP.todayIndex;
  };
  const parseTime = (str) => {
    if (!str) return '';
    const m = String(str).match(/(\d{1,2}:\d{2})/);
    return m ? m[1] : '';
  };

  const [name,         setName]         = useState(stay?.name      || '');
  const [checkInDay,   setCheckInDay]   = useState(() => stay?.checkInDay  != null ? stay.checkInDay  : parseDay(stay?.checkIn));
  const [checkInTime,  setCheckInTime]  = useState(() => stay?.checkInTime || parseTime(stay?.checkIn)  || '');
  const [checkOutDay,  setCheckOutDay]  = useState(() => stay?.checkOutDay != null ? stay.checkOutDay : parseDay(stay?.checkOut));
  const [checkOutTime, setCheckOutTime] = useState(() => stay?.checkOutTime || parseTime(stay?.checkOut) || '');
  const [addr,         setAddr]         = useState(stay?.addr      || '');
  const [mapUrl,       setMapUrl]       = useState(stay?.mapUrl    || stay?.mapsUrl || '');
  const [phone,        setPhone]        = useState(stay?.phone     || '');
  const [code,         setCode]         = useState(stay?.code      || '');
  const [breakfast,    setBreakfast]    = useState(stay?.breakfast || '');
  const [notes,        setNotes]        = useState(stay?.notes     || '');
  const [confirmDel,   setConfirmDel]   = useState(false);
  const [showInPicker, setShowInPicker]   = useState(false);
  const [showOutPicker, setShowOutPicker] = useState(false);

  const autoNights = checkOutDay > checkInDay ? checkOutDay - checkInDay : 0;

  const fmtDay = (dayIdx, time) => {
    const d = DAYS[dayIdx];
    const dow = d.dow.replace('週', '');
    return d.date + '（' + dow + '）' + (time ? '  ' + time : '');
  };

  const handleSave = () => {
    onSave({
      id:           stay?.id || ('st' + Date.now()),
      name:         name.trim() || '未命名住宿',
      checkInDay,   checkInTime,
      checkOutDay,  checkOutTime,
      checkIn:      fmtDay(checkInDay, checkInTime),
      checkOut:     fmtDay(checkOutDay, checkOutTime),
      nights:       autoNights,
      addr:         addr.trim(),
      mapUrl:       mapUrl.trim(),
      mapsUrl:      mapUrl.trim(),   // backward compat
      phone:        phone.trim(),
      code:         code.trim(),
      breakfast:    breakfast.trim(),
      notes:        notes.trim(),
    });
  };

  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
      maxWidth: 430, margin: '0 auto',
      background: T.bg, zIndex: 100,
      display: 'flex', flexDirection: 'column',
      fontFamily: T.font, color: T.ink,
    }}>
      {/* header */}
      <div style={{
        padding: 'calc(env(safe-area-inset-top, 0px) + 20px) 16px 12px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        background: T.bg,
      }}>
        <button onClick={onClose} style={{
          border: '1px solid ' + T.divider, background: '#fff', cursor: 'pointer',
          width: 38, height: 38, borderRadius: 12, boxShadow: T.shadowSoft,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name="close" size={20} color={T.ink2}/>
        </button>
        <div style={{ fontSize: 17, fontWeight: 700, color: T.ink, letterSpacing: -0.2 }}>
          {stay ? '編輯住宿' : '新增住宿'}
        </div>
        <button onClick={handleSave} style={{
          border: 'none', background: T.primary, color: '#fff',
          cursor: 'pointer', padding: '8px 16px', borderRadius: 20,
          fontFamily: T.font, fontSize: 14, fontWeight: 700,
        }}>儲存</button>
      </div>

      {/* body */}
      <div style={{ flex: 1, overflow: 'auto', padding: '4px 16px 40px', display: 'flex', flexDirection: 'column', gap: 14 }}>

        {/* 基本資訊 */}
        <StayFieldCard>
          <StayRow label="住宿名稱" icon="bed">
            <input value={name} onChange={e => setName(e.target.value)}
              placeholder="飯店 / 民宿名稱" style={stayInputStyle}/>
          </StayRow>
          <StayDivider/>
          <StayRow label="入住日期" icon="calendar">
            <button onClick={() => setShowInPicker(true)} style={{
              border: 'none', background: 'transparent', cursor: 'pointer',
              fontFamily: T.font, fontSize: 14, fontWeight: 600, color: T.primary, padding: 0,
            }}>
              {DAYS[checkInDay].date}（{DAYS[checkInDay].dow.replace('週','')}）
            </button>
          </StayRow>
          <StayDivider/>
          <StayRow label="入住時間" icon="clock">
            <input type="time" value={checkInTime} onChange={e => setCheckInTime(e.target.value)}
              style={{ ...stayInputStyle, width: 110 }}/>
          </StayRow>
          <StayDivider/>
          <StayRow label="退房日期" icon="calendar">
            <button onClick={() => setShowOutPicker(true)} style={{
              border: 'none', background: 'transparent', cursor: 'pointer',
              fontFamily: T.font, fontSize: 14, fontWeight: 600, color: T.primary, padding: 0,
            }}>
              {DAYS[checkOutDay].date}（{DAYS[checkOutDay].dow.replace('週','')}）
            </button>
          </StayRow>
          <StayDivider/>
          <StayRow label="退房時間" icon="clock">
            <input type="time" value={checkOutTime} onChange={e => setCheckOutTime(e.target.value)}
              style={{ ...stayInputStyle, width: 110 }}/>
          </StayRow>
          <StayDivider/>
          <StayRow label="晚數" icon="moon">
            <span style={{ ...stayInputStyle, color: T.ink2, display: 'block' }}>
              {autoNights > 0 ? autoNights + ' 晚' : '—'}
            </span>
          </StayRow>
        </StayFieldCard>

        {/* 地點 */}
        <StayFieldCard>
          <StayRow label="地址" icon="pin">
            <input value={addr} onChange={e => setAddr(e.target.value)}
              placeholder="飯店地址" style={stayInputStyle}/>
          </StayRow>
          <StayDivider/>
          <StayRow label="地圖連結" icon="map">
            <input value={mapUrl} onChange={e => setMapUrl(e.target.value)}
              placeholder="Naver / KakaoMap / Google Maps" style={stayInputStyle}/>
          </StayRow>
          <StayDivider/>
          <StayRow label="電話" icon="phone">
            <input value={phone} onChange={e => setPhone(e.target.value)}
              placeholder="+82-2-xxx-xxxx" style={stayInputStyle}/>
          </StayRow>
        </StayFieldCard>

        {/* 訂房資訊 */}
        <StayFieldCard>
          <StayRow label="訂房代碼" icon="ticket">
            <input value={code} onChange={e => setCode(e.target.value)}
              placeholder="訂房代碼 / 備註" style={stayInputStyle}/>
          </StayRow>
          <StayDivider/>
          <StayRow label="早餐" icon="coffee">
            <input value={breakfast} onChange={e => setBreakfast(e.target.value)}
              placeholder="含早餐 / 不含" style={stayInputStyle}/>
          </StayRow>
        </StayFieldCard>

        {/* 備註 */}
        <StayFieldCard>
          <StayRow label="備註" icon="note">
            <textarea value={notes} onChange={e => setNotes(e.target.value)}
              placeholder="選填備註" rows={2}
              style={{ ...stayInputStyle, resize: 'none', lineHeight: 1.5 }}/>
          </StayRow>
        </StayFieldCard>

        {/* 刪除 */}
        {onDelete && !confirmDel && (
          <button onClick={() => setConfirmDel(true)} style={{
            width: '100%', padding: 14, borderRadius: 20, border: 'none',
            background: T.roseSoft, cursor: 'pointer',
            fontSize: 14, fontWeight: 600, color: T.rose, fontFamily: T.font,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            <Icon name="trash" size={16} color={T.rose} strokeWidth={2}/>
            刪除此住宿
          </button>
        )}

        {confirmDel && (
          <div style={{ background: T.roseSoft, borderRadius: 18, padding: '16px' }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: T.ink, textAlign: 'center', marginBottom: 12 }}>
              確定要刪除此住宿嗎？
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => setConfirmDel(false)} style={{
                flex: 1, padding: '11px 0', borderRadius: 16,
                border: '1px solid ' + T.divider, background: '#fff',
                fontSize: 14, fontWeight: 600, color: T.ink, cursor: 'pointer', fontFamily: T.font,
              }}>取消</button>
              <button onClick={() => onDelete(stay.id)} style={{
                flex: 1, padding: '11px 0', borderRadius: 16,
                border: 'none', background: T.rose,
                fontSize: 14, fontWeight: 700, color: '#fff', cursor: 'pointer', fontFamily: T.font,
              }}>確認刪除</button>
            </div>
          </div>
        )}
      </div>

      {showInPicker && (
        <StayDayPicker current={checkInDay} onSelect={setCheckInDay} onClose={() => setShowInPicker(false)}/>
      )}
      {showOutPicker && (
        <StayDayPicker current={checkOutDay} onSelect={setCheckOutDay} onClose={() => setShowOutPicker(false)}/>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// ScreenStay — 住宿資訊頁
// ─────────────────────────────────────────────────────────────
function ScreenStay({ stays, onEditStay, onDeleteStay }) {
  const tonight = stays.find(s =>
    s.covers && s.covers.includes(TRIP.todayIndex)
  );

  return (
    <>
      {/* 今晚住宿 banner */}
      {tonight && (
        <div style={{ padding: '4px 16px 12px' }}>
          <div style={{
            padding: '12px 16px', borderRadius: 18,
            background: 'linear-gradient(135deg, ' + T.primary + '18 0%, ' + T.primary + '08 100%)',
            border: '1.5px solid ' + T.primary + '33',
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <Icon name="moon" size={18} color={T.primary}/>
            <div>
              <div style={{ fontSize: 11, color: T.primary, fontWeight: 700, letterSpacing: 0.6 }}>
                今晚住宿
              </div>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 2 }}>
                {tonight.name}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 住宿清單 */}
      <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        {stays.map(s => (
          <StayCard key={s.id} stay={s} onEdit={() => onEditStay(s)} onDelete={() => onDeleteStay(s.id)}/>
        ))}

        {stays.length === 0 && (
          <Card pad={32} style={{ textAlign: 'center' }}>
            <Icon name="bed" size={32} color={T.ink4} strokeWidth={1.4}/>
            <div style={{ fontSize: 13, color: T.ink3, marginTop: 10 }}>尚未新增住宿</div>
          </Card>
        )}
      </div>

      <div style={{ height: 24 }}/>
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// StayCard — 住宿卡片
// ─────────────────────────────────────────────────────────────
function StayCard({ stay, onEdit, onDelete }) {
  const [confirmDel, setConfirmDel] = useState(false);

  const mapTarget = (stay.mapUrl || stay.mapsUrl)
    ? (stay.mapUrl || stay.mapsUrl)
    : stay.addr
      ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(stay.addr)
    : null;

  return (
    <Card pad={0}>
      {/* hero */}
      <div style={{ padding: '16px 16px 14px' }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: T.ink, letterSpacing: -0.2 }}>
          {stay.name}
        </div>
        {stay.checkIn && (
          <div style={{ fontSize: 12, color: T.ink3, marginTop: 5, lineHeight: 1.5 }}>
            {stay.checkIn}
            {stay.checkOut && (' → ' + stay.checkOut)}
          </div>
        )}
        {stay.nights > 0 && (
          <div style={{ marginTop: 8 }}>
            <Pill size="s">{stay.nights} 晚</Pill>
          </div>
        )}
      </div>

// ─────────────────────────────────────────────────────────────
// Helper: 計算某成員應分攤金額（KRW）
// ─────────────────────────────────────────────────────────────
function calcMemberShare(memberId, expenses) {
  return expenses.reduce((sum, e) => {
    if (!e.split || !e.split.includes(memberId)) return sum;
    const amount = Number(e.krw) || 0;
    const splitCount = e.split.length || 1;
    return sum + amount / splitCount;
  }, 0);
}

// ─────────────────────────────────────────────────────────────
// Expense (消費記錄)
// ─────────────────────────────────────────────────────────────
function ScreenExpense({ expenses, onAddExpense, onViewSplit, onEditExpense, memberBudgets, onEditBudget }) {

  const [day, setDay] = useState('all');

  const filtered = expenses.filter(e =>
    (cat === 'all' || e.cat === cat) &&
    (day === 'all' || e.day === day)
  );

  // ── 英雄卡片資料 ──────────────────────────────────────────
  const allTWD = krwToTwd(expenses.reduce((s, e) => s + e.krw, 0));
  const totalBudget = MEMBERS.reduce((s, m) => s + ((memberBudgets && memberBudgets[m.id]) || 50000), 0);

  let heroTitle, heroSpent, heroBudget, heroSubtitle;
  if (memberView === 'all') {
    heroTitle    = '旅程總花費';
    heroSpent    = allTWD;
    heroBudget   = totalBudget;
    heroSubtitle = `${expenses.length} 筆消費`;
  } else {
    const m = MEMBERS.find(x => x.id === memberView);
    const shareKRW = calcMemberShare(memberView, expenses);
    const mb = (memberBudgets && memberBudgets[memberView]) || 50000;

    ...m,

  // ── 消費清單（依日期群組）────────────────────────────────
  const groups = {};

            display: 'flex', gap: 6, overflowX: 'auto', marginBottom: 14,
            scrollbarWidth: 'none', paddingBottom: 2,

            {[{ id: 'all', name: '全部' }, ...MEMBERS].map(m => {

              return (
                <button key={m.id} onClick={() => setMemberView(m.id)} style={{

                  fontFamily: T.font, letterSpacing: 0.2,

          </div>

          {/* 標題 + 修改預算按鈕（只在單一成員時顯示） */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ fontSize: 11, color: T.ink3, fontWeight: 700, letterSpacing: 1 }}>

            {memberView !== 'all' && onEditBudget && (
              <button onClick={() => onEditBudget(memberView)} style={{

            )}
          </div>
          <div style={{ fontSize: 12, color: T.ink2, marginTop: 2 }}>{heroSubtitle}</div>

        </Card>
      </div>

      {/* ── 篩選 ── */}
      <SectionHeader title="篩選 / 全部消費"/>
      <div style={{ padding: '0 16px 8px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>

      <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        {Object.entries(groups).map(([date, list]) => {

// screen-split.jsx — 分帳結算頁（overlay style）

// ─────────────────────────────────────────────────────────────
// 結算計算邏輯
// ─────────────────────────────────────────────────────────────
function computeSettlement(expenses) {
  // shareKRW[id] = 此人應分攤（KRW）
  // paidKRW[id]  = 此人實際付款（KRW）
  const shareKRW = {}, paidKRW = {};
  MEMBERS.forEach(m => { shareKRW[m.id] = 0; paidKRW[m.id] = 0; });

  expenses.forEach(e => {
    if (paidKRW[e.payer] !== undefined) paidKRW[e.payer] += e.krw;
    const per = e.krw / e.split.length;
    e.split.forEach(id => {
      if (shareKRW[id] !== undefined) shareKRW[id] += per;
    });
  });

  // net[id] > 0 → 此人需要付出更多（owe）
  // net[id] < 0 → 此人應收回錢（credit）
  const netKRW = {};
  MEMBERS.forEach(m => { netKRW[m.id] = shareKRW[m.id] - paidKRW[m.id]; });

  // 最小化交易的貪婪演算法
  const debtors   = MEMBERS.filter(m => netKRW[m.id] >  0.5).map(m => ({ id: m.id, name: m.name, amt: netKRW[m.id] }));
  const creditors = MEMBERS.filter(m => netKRW[m.id] < -0.5).map(m => ({ id: m.id, name: m.name, amt: -netKRW[m.id] }));
  debtors.sort((a, b) => b.amt - a.amt);
  creditors.sort((a, b) => b.amt - a.amt);

  const d = debtors.map(x => ({ ...x }));
  const c = creditors.map(x => ({ ...x }));
  const transactions = [];
  let i = 0, j = 0;
  while (i < d.length && j < c.length) {
    const amount = Math.min(d[i].amt, c[j].amt);
    if (amount > 0.5) {
      transactions.push({ from: d[i].id, to: c[j].id, krw: Math.round(amount) });
    }
    d[i].amt -= amount;
    c[j].amt -= amount;
    if (d[i].amt < 0.5) i++;
    if (c[j].amt < 0.5) j++;
  }

  return { shareKRW, paidKRW, netKRW, transactions };
}

                      </div>
                    </div>
                  </Card>
                );
              })}
            </div>
          )}
        </div>

        {/* ── 說明 ── */}
        <div style={{
          padding: '10px 14px', borderRadius: 14,
          background: T.bgSoft, border: '1px solid ' + T.divider,
        }}>
          <div style={{ fontSize: 11, color: T.ink3, lineHeight: 1.6 }}>
            <strong style={{ color: T.ink2 }}>付款人</strong>：實際刷卡或付現的人<br/>
            <strong style={{ color: T.ink2 }}>應分攤</strong>：此人實際需負擔的費用<br/>
            <strong style={{ color: T.ink2 }}>轉帳清單</strong>：已最佳化，用最少筆數完成結算
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ app.jsx ═══
// app.jsx — main App: state, navigation, Firestore sync

// ─── date helpers ───────────────────────────────────────────
function getCurrentDateLabel() {
  const now = new Date();
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  const yyyy = now.getFullYear();
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const dd   = String(now.getDate()).padStart(2, '0');
  return `${yyyy} / ${mm} / ${dd}・週${weekdays[now.getDay()]}`;
}
function getCurrentWeekday() {
  return ['日', '一', '二', '三', '四', '五', '六'][new Date().getDay()];
}

// ─── localStorage helpers ───────────────────────────────────
function lsGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw !== null) return JSON.parse(raw);
  } catch(e) {}
  return fallback;
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
}

// ─── Firestore helpers ──────────────────────────────────────
// Firestore stores object keys as strings; convert back to numbers for dayIdx
function normalizeItinItems(raw) {
  if (!raw || typeof raw !== 'object') return {};
  const result = {};
  Object.keys(raw).forEach(k => { result[Number(k)] = raw[k]; });
  return result;
}

// Write a partial update to the trip document (merge mode)
function writeToFirestore(updates) {
  try {
    const sync = window.FirebaseSync;
    if (!sync || !sync.ready) return;
    sync.setDoc(sync.tripRef(), updates, { merge: true })
      .catch(e => console.warn('[FS write]', e));
  } catch(e) { console.warn('[FS]', e); }
}

function App() {
  const [tab, setTab] = useState(() => {
    const saved = lsGet('familyTrip_activeTab', 'home');
    return ['home','today','itinerary','expense','stay'].includes(saved) ? saved : 'home';
  });
  const [showAdd,      setShowAdd]      = useState(false);
  const [showSplit,    setShowSplit]    = useState(false);
  const [showItinForm, setShowItinForm] = useState(false);
  const [editExpense,  setEditExpense]  = useState(null);
  const [editItinItem, setEditItinItem] = useState(null);
  const [editItinDay,  setEditItinDay]  = useState(null);
  const [itineraryDay, setItineraryDay] = useState(TRIP.todayIndex);

  // ── expenses — localStorage persisted ──────────────────────
  const [expenses, setExpenses] = useState(() =>
    lsGet('familyTrip_expenses', EXPENSES_INIT)
  );
  useEffect(() => { lsSet('familyTrip_expenses', expenses); }, [expenses]);

  // ── 保存目前頁面 ─────────────────────────────────────────
  useEffect(() => { lsSet('familyTrip_activeTab', tab); }, [tab]);

  // ── per-member budgets — localStorage persisted ─────────────
  const [memberBudgets, setMemberBudgets] = useState(() => {
    const defaults = {};
    MEMBERS.forEach(m => { defaults[m.id] = 50000; });
    return lsGet('familyTrip_memberBudgets', defaults);
  });
  useEffect(() => { lsSet('familyTrip_memberBudgets', memberBudgets); }, [memberBudgets]);

  // ── stays — localStorage persisted ─────────────────────────
  const [stays, setStays] = useState(() =>
    lsGet('familyTrip_stays', STAYS.map(s => ({ ...s })))
  );
  useEffect(() => { lsSet('familyTrip_stays', stays); }, [stays]);

  // ── itinerary items — localStorage persisted ───────────────
  const [allItinItems, setAllItinItems] = useState(() => {
    const fallback = {};
    DAYS.forEach(d => { fallback[d.idx] = d.items.map(it => ({ ...it })); });
    return lsGet('familyTrip_itineraryItems', fallback);
  });
  useEffect(() => { lsSet('familyTrip_itineraryItems', allItinItems); }, [allItinItems]);

  // ── Firestore real-time sync ────────────────────────────────
  const fsReadyRef = useRef(false);
  const fsUnsubRef = useRef(null);

  useEffect(() => {
    const startSync = () => {
      try {
        const sync = window.FirebaseSync;
        if (!sync || !sync.ready) return;

        const tripRef = sync.tripRef();

        fsUnsubRef.current = sync.onSnapshot(tripRef, (snap) => {
          // Document does not exist yet: seed Firestore from localStorage
          if (!snap.exists()) {
            const fallbackItin = {};
            DAYS.forEach(d => { fallbackItin[d.idx] = d.items.map(it => ({ ...it })); });
            const memberDefaults = {};
            MEMBERS.forEach(m => { memberDefaults[m.id] = 50000; });
            const initData = {
              expenses:       lsGet('familyTrip_expenses',       EXPENSES_INIT),
              itineraryItems: lsGet('familyTrip_itineraryItems', fallbackItin),
              stays:          lsGet('familyTrip_stays',          STAYS.map(s => ({ ...s }))),
              memberBudgets:  lsGet('familyTrip_memberBudgets',  memberDefaults),
            };
            sync.setDoc(tripRef, initData).catch(e => console.warn('[FS seed]', e));
            fsReadyRef.current = true;
            console.info('[FS] 首次初始化，已將本地資料寫入 Firestore');
            return;
          }

          const data = snap.data();

          // First snapshot with existing data: replace local state with Firestore data
          if (!fsReadyRef.current) {
            fsReadyRef.current = true;
            if (data.expenses)       setExpenses(data.expenses);
            if (data.itineraryItems) setAllItinItems(normalizeItinItems(data.itineraryItems));
            if (data.stays)          setStays(data.stays);
            if (data.memberBudgets)  setMemberBudgets(data.memberBudgets);
            console.info('[FS] 從 Firestore 載入資料完成');
            return;
          }

          // Real-time update from another device (skip our own pending writes)
          if (!snap.metadata.hasPendingWrites) {
            if (data.expenses)       setExpenses(data.expenses);
            if (data.itineraryItems) setAllItinItems(normalizeItinItems(data.itineraryItems));
            if (data.stays)          setStays(data.stays);
            if (data.memberBudgets)  setMemberBudgets(data.memberBudgets);
          }
        }, err => console.warn('[FS snapshot error]', err));

      } catch(e) { console.warn('[FS startSync]', e); }
    };

    if (window.FirebaseSync && window.FirebaseSync.ready) {
      startSync();
    } else {
      window.addEventListener('firebase-ready', startSync, { once: true });
    }

    return () => { if (fsUnsubRef.current) fsUnsubRef.current(); };
  }, []);

  // ── budget form ─────────────────────────────────────────────
  const [showBudgetForm,     setShowBudgetForm]     = useState(false);
  const [editBudgetMemberId, setEditBudgetMemberId] = useState(null);

  const handleEditBudget = (memberId) => {
    setEditBudgetMemberId(memberId);
    setShowBudgetForm(true);
  };
  const handleSaveMemberBudget = (memberId, amount) => {
    setMemberBudgets(prev => {
      const next = { ...prev, [memberId]: amount };
      writeToFirestore({ memberBudgets: next });
      return next;
    });
    setShowBudgetForm(false);
    setEditBudgetMemberId(null);
  };

  // ── stay handlers ───────────────────────────────────────────
  const [showStayForm, setShowStayForm] = useState(false);
  const [editStay,     setEditStay]     = useState(null);

  const handleEditStay   = (stay) => { setEditStay(stay); setShowStayForm(true); };
  const handleSaveStay   = (newS) => {
    setStays(prev => {
      const next = editStay
        ? prev.map(s => s.id === newS.id ? newS : s)
        : [...prev, newS];
      writeToFirestore({ stays: next });
      return next;
    });
    setEditStay(null);
    setShowStayForm(false);
  };
  const handleDeleteStay = (id) => {
    setStays(prev => {
      const next = prev.filter(s => s.id !== id);
      writeToFirestore({ stays: next });
      return next;
    });
    setEditStay(null);
    setShowStayForm(false);
  };

  // ── itinerary handlers ──────────────────────────────────────
  const handleSaveItinItem = (item, dayIdx) => {
    setAllItinItems(prev => {
      const list = [...(prev[dayIdx] || [])];
      const idx  = list.findIndex(x => x.id === item.id);
      if (idx >= 0) list[idx] = item;
      else { list.push(item); list.sort((a, b) => a.time.localeCompare(b.time)); }
      const next = { ...prev, [dayIdx]: list };
      writeToFirestore({ itineraryItems: next });
      return next;
    });
  };

  const handleDeleteItinItem = (itemId, dayIdx) => {
    setAllItinItems(prev => {
      const next = { ...prev, [dayIdx]: (prev[dayIdx] || []).filter(x => x.id !== itemId) };
      writeToFirestore({ itineraryItems: next });
      return next;
    });
  };

  const handleOpenItinForm = (item, dayIdx) => {
    setEditItinItem(item || null);
    setEditItinDay(dayIdx ?? TRIP.todayIndex);
    setShowItinForm(true);
  };

  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  }, [tab]);

  const handleNav = (id) => {
    if (['home','today','itinerary','expense','stay'].includes(id)) {
      setTab(id);
    } else {
      if (id === 'sub-budget' || id === 'sub-split') setTab('expense');
      else if (['sub-tx','sub-mem','sub-saved','sub-set'].includes(id)) setTab('itinerary');
    }
  };

  const handleEditExpense = (e) => { setEditExpense(e); setShowAdd(true); };

  const handleAddExpense = (newE) => {
    setExpenses(prev => {
      const next = editExpense
        ? prev.map(e => e.id === newE.id ? newE : e)
        : [...prev, newE];
      writeToFirestore({ expenses: next });
      return next;
    });
    setEditExpense(null);
    setShowAdd(false);
    setTab('expense');
  };

  const handleDeleteExpense = (id) => {
    setExpenses(prev => {
      const next = prev.filter(e => e.id !== id);
      writeToFirestore({ expenses: next });
      return next;
    });
    setEditExpense(null);
    setShowAdd(false);
    setTab('expense');
  };

  // top bar config per tab
const topBarFor = (t) => ({
    home:      { sub: getCurrentDateLabel(), title: `哈囉，週${getCurrentWeekday()}早安 👋` },
    today:     { sub: 'TODAY',               title: '今日行程' },
    itinerary: { sub: 'ITINERARY',           title: '行程總覽' },
    expense:   { sub: 'EXPENSE',             title: '消費記錄' },
    stay:      { sub: 'STAY',                title: '住宿資訊' },
  }[t]);

  const tb = topBarFor(tab);

  let content;
  if (tab === 'home') {
    content = <ScreenDashboard
      expenses={expenses} memberBudgets={memberBudgets}
      onNav={handleNav} onAddExpense={() => setShowAdd(true)}
      todayItems={allItinItems[TRIP.todayIndex] || []}
    />;
  } else if (tab === 'today') {
    content = <ScreenToday expenses={expenses} todayItems={allItinItems[TRIP.todayIndex] || []}/>;
  } else if (tab === 'itinerary') {
    content = <ScreenItinerary
      initialDay={itineraryDay}
      allItemsExt={allItinItems}
      onSaveItemExt={handleSaveItinItem}
      onDeleteItemExt={handleDeleteItinItem}
      onOpenEditForm={handleOpenItinForm}
    />;
  } else if (tab === 'expense') {
    content = <ScreenExpense
      expenses={expenses}
      memberBudgets={memberBudgets}
      onAddExpense={() => setShowAdd(true)}
      onViewSplit={() => setShowSplit(true)}
      onEditExpense={handleEditExpense}
      onEditBudget={handleEditBudget}
    />;
  } else if (tab === 'stay') {
    content = <ScreenStay stays={stays} onEditStay={handleEditStay} onDeleteStay={handleDeleteStay}/>;
  }

  const showFab        = tab === 'itinerary' || tab === 'expense' || tab === 'stay';
  const fabIsItinerary = tab === 'itinerary';
  const fabIsStay      = tab === 'stay';

  return (
    <div style={{
      position: 'fixed', top: 0, bottom: 0, left: 0, right: 0,
      maxWidth: 430, margin: '0 auto',
      background: T.bg, fontFamily: T.font,
      overflow: 'hidden',
    }}>
      <TopBar title={tb.title} sub={tb.sub}/>

      <AppShell scrollRef={scrollRef}>
        {content}
      </AppShell>

      {showFab && !showAdd && !showItinForm && !showStayForm && !showBudgetForm && (
        <FAB
          onClick={() => fabIsItinerary ? handleOpenItinForm(null, itineraryDay) : fabIsStay ? setShowStayForm(true) : setShowAdd(true)}
          label={fabIsItinerary ? '新增行程' : fabIsStay ? '新增住宿' : '新增消費'}
        />
      )}

      {!showAdd && !showItinForm && !showStayForm && !showBudgetForm && (
        <BottomNav active={tab} onChange={handleNav}/>
      )}

      {showAdd && (
        <ScreenAddExpense
          onClose={() => { setShowAdd(false); setEditExpense(null); }}
          onSave={handleAddExpense}
          onDelete={handleDeleteExpense}
          editExpense={editExpense}
        />
      )}

      {showItinForm && (
        <ItineraryForm
          item={editItinItem}
          dayIdx={editItinDay ?? (tab === 'itinerary' ? itineraryDay : TRIP.todayIndex)}
          onSave={(item) => {
            const targetDay = item.dayIdx ?? editItinDay ?? (tab === 'itinerary' ? itineraryDay : TRIP.todayIndex);
            const oldDay    = editItinItem ? (editItinItem.dayIdx ?? editItinDay ?? targetDay) : targetDay;
            if (editItinItem && oldDay !== targetDay) {
              handleDeleteItinItem(editItinItem.id, oldDay);
            }
            handleSaveItinItem(item, targetDay);
            setShowItinForm(false);
            setEditItinItem(null);
            setEditItinDay(null);
          }}
          onDelete={editItinItem ? () => {
            const oldDay = editItinItem.dayIdx ?? editItinDay ?? (tab === 'itinerary' ? itineraryDay : TRIP.todayIndex);
            handleDeleteItinItem(editItinItem.id, oldDay);
            setShowItinForm(false);
            setEditItinItem(null);
            setEditItinDay(null);
          } : null}
          onClose={() => {
            setShowItinForm(false);
            setEditItinItem(null);
            setEditItinDay(null);
          }}
        />
      )}

      {showBudgetForm && editBudgetMemberId && (
        <BudgetForm
          memberId={editBudgetMemberId}
          memberBudget={memberBudgets[editBudgetMemberId] || 50000}
          expenses={expenses}
          onClose={() => { setShowBudgetForm(false); setEditBudgetMemberId(null); }}
          onSave={handleSaveMemberBudget}
        />
      )}

      {showStayForm && (
        <StayForm
          stay={editStay}
          onClose={() => { setShowStayForm(false); setEditStay(null); }}
          onSave={handleSaveStay}
          onDelete={editStay ? handleDeleteStay : null}
        />
      )}

      {showSplit && (
        <ScreenSplit expenses={expenses} e={() => setShowSplit(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
